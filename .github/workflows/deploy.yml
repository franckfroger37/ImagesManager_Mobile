name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Pillow (generation des icones)
        run: pip3 install Pillow --break-system-packages -q

      - name: Generate assets (icon, splash, favicon)
        run: python3 scripts/generate-assets.py

      - name: Build
        run: npm run build

      - name: Copy PWA files to dist
        run: |
          cp assets/icon-512.png dist/icon-512.png
          cp assets/icon-192.png dist/icon-192.png
          cp assets/favicon.png  dist/favicon.png
          cp web/manifest.json   dist/manifest.json
          cp web/sw.js           dist/sw.js
          echo "Fichiers PWA copiés :"
          ls -lh dist/manifest.json dist/sw.js dist/icon-*.png dist/favicon.png

      - name: Verify PWA tags in index.html
        run: |
          echo "=== Contenu index.html ==="
          cat dist/index.html
          echo ""
          if grep -q 'manifest.json' dist/index.html; then
            echo "OK : manifest.json trouvé dans index.html"
          else
            echo "AVERTISSEMENT : manifest.json absent de index.html"
          fi
          if grep -q 'im-splash' dist/index.html; then
            echo "OK : splash screen trouvé dans index.html"
          else
            echo "AVERTISSEMENT : splash screen absent de index.html"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
