name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Pillow (generation des icones)
        run: pip3 install Pillow --break-system-packages -q

      - name: Generate assets (icon, splash, favicon)
        run: python3 scripts/generate-assets.py

      - name: Build
        run: npm run build

      - name: Copy PWA files to dist
        run: |
          cp assets/icon-512.png dist/icon-512.png
          cp assets/icon-192.png dist/icon-192.png
          cp assets/favicon.png  dist/favicon.png
          cp web/manifest.json   dist/manifest.json
          cp web/sw.js           dist/sw.js
          echo "Fichiers PWA copies :"
          ls -lh dist/manifest.json dist/sw.js dist/icon-*.png dist/favicon.png

      - name: Patch index.html (manifest PWA + splash screen)
        run: python3 scripts/patch-html.py

      - name: Verify PWA tags present
        run: |
          if grep -q 'manifest.json' dist/index.html; then
            echo "OK : lien manifest.json present"
          else
            echo "ERREUR : lien manifest.json absent !" && exit 1
          fi
          if grep -q 'im-splash' dist/index.html; then
            echo "OK : splash screen present"
          else
            echo "ERREUR : splash screen absent !" && exit 1
          fi
          echo "=== Premiere partie de index.html ==="
          head -60 dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
