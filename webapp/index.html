<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Images Manager V2</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
      padding-top: 8px;
    }
    .logo-icon { font-size: 52px; }
    .logo-name  {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      margin-top: 6px;
    }
    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
  </style>
<!-- deploy trigger -->
</head>
<body>
<div class="screen">

  <!-- Header -->
  <header class="header">
    <h1>Images Manager V2</h1>
    <button class="icon-btn" id="btnSettings" title="Param脙聝脗篓tres">脙垄脗職脗聶脙炉脗赂脗聫</button>
  </header>

  <!-- Scrollable content -->
  <main class="content">

    <div class="logo-wrap">
      <div class="logo-icon">脙掳脗聼脗聸脗聧脙炉脗赂脗聫</div>
      <div class="logo-name">Images Manager V2</div>
      <div class="logo-sub">Publiez vos produits en quelques secondes</div>
    </div>

    <!-- Action tiles -->
    <div class="tiles">

      <!-- Appareil photo -->
      <div class="tile" id="tileCamera">
        <span class="tile-icon">脙掳脗聼脗聯脗路</span>
        <span class="tile-label">Appareil photo</span>
        <input type="file" accept="image/*" capture="environment"
               id="inputCamera" style="display:none">
      </div>

      <!-- Galerie -->
      <div class="tile" id="tileGallery">
        <span class="tile-icon">脙掳脗聼脗聳脗录脙炉脗赂脗聫</span>
        <span class="tile-label">Galerie</span>
        <input type="file" accept="image/*"
               id="inputGallery" style="display:none">
      </div>

      <!-- G脙聝脗漏rer les produits -->
      <div class="tile tile-wide" id="tileManage">
        <span class="tile-icon">脙掳脗聼脗聯脗娄</span>
        <span class="tile-label">G脙聝脗漏rer les produits</span>
      </div>

    </div>

    <!-- Settings warning (hidden by default) -->
    <div id="settingsWarning" class="card" style="display:none; margin-top:20px; border-color: var(--warn);">
      <p style="color:var(--warn); font-weight:600; margin-bottom:8px;">脙垄脗職脗聽脙炉脗赂脗聫 Param脙聝脗篓tres manquants</p>
      <p style="font-size:14px; color:var(--muted); margin-bottom:12px;">
        Configurez vos identifiants WooCommerce pour publier des produits.
      </p>
      <button class="btn btn-outline btn-full btn-sm" id="btnGoSettings">Configurer maintenant</button>
    </div>

  </main>
</div>

<div id="toast"></div>

<script src="js/api.js"></script>
<script>
  // 脙垄脗聰脗聙脙垄脗聰脗聙 Init 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙
  document.addEventListener('DOMContentLoaded', () => {
    if (!hasSettings()) {
      document.getElementById('settingsWarning').style.display = 'block';
    }

    // Settings button
    document.getElementById('btnSettings').onclick = () => goTo('settings.html');
    document.getElementById('btnGoSettings')?.addEventListener('click', () => goTo('settings.html'));

    // Camera tile
    document.getElementById('tileCamera').onclick = () => {
      document.getElementById('inputCamera').click();
    };

    // Gallery tile
    document.getElementById('tileGallery').onclick = () => {
      document.getElementById('inputGallery').click();
    };

    // Manage tile
    document.getElementById('tileManage').onclick = () => {
      if (!requireSettings()) return;
      goTo('manage.html');
    };

    // Handle file selection (both camera and gallery)
    document.getElementById('inputCamera').onchange = handleFileSelect;
    document.getElementById('inputGallery').onchange = handleFileSelect;
  });

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (!hasSettings()) {
      showToast('Configurez vos param脙聝脗篓tres d\'abord', 'warn');
      goTo('settings.html');
      return;
    }

    // Store file in sessionStorage as data URL then go to crop
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        sessionStorage.setItem('im_source_image', evt.target.result);
        goTo('crop.html');
      } catch {
        // sessionStorage full 脙垄脗聙脗聰 try smaller storage
        showToast('Image trop lourde, veuillez en choisir une autre', 'error');
      }
    };
    reader.readAsDataURL(file);

    // Reset input so same file can be re-selected
    e.target.value = '';
  }
</script>
</body>
</html>
